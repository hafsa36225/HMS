<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management | Billing & Finance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 1.5rem;
            position: relative;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(3px);
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .card-header {
            background: linear-gradient(120deg, #1e6f5c, #289672);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .card-header h1 {
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            background: rgba(255,255,255,0.2);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 0.8rem;
            color: #fff;
        }

        .form-section, .list-section {
            padding: 1.8rem 2rem;
        }

        .form-section {
            border-bottom: 1px solid #d4e6e1;
        }

        .form-section h2, .list-toolbar h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e6f5c;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 5rem;
            flex-wrap: wrap;
        }

        .form-row .field {
            flex: 1;
            min-width: 180px;
        }

        .form-row.full .field.full-width {
            flex: 1;
            width: 100%;
        }

        .field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            color: #1e6f5c;
            margin-bottom: 5px;
        }

        .field input, .field select, .field textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cce5e0;
            border-radius: 14px;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
            font-family: inherit;
        }

        .field input:focus, .field select:focus, .field textarea:focus {
            outline: none;
            border-color: #289672;
            box-shadow: 0 0 0 3px rgba(40,150,114,0.15);
        }

        .btn-submit {
            background: #289672;
            border: none;
            color: white;
            padding: 12px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: #1e6f5c;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .list-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .search-type {
            background: #f1f5f9;
            border-radius: 40px;
            padding: 0.2rem 0.5rem;
            border: 1px solid #cbdbe2;
        }

        .search-type select {
            border: none;
            background: transparent;
            padding: 6px 10px;
            font-size: 0.8rem;
            outline: none;
            cursor: pointer;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            border: 1px solid #cbdbe2;
        }

        .search-box i {
            color: #5f7d95;
        }

        .search-box input {
            border: none;
            background: transparent;
            padding: 8px 12px;
            width: 220px;
            outline: none;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 18px;
            border: 1px solid #cce5e0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        td {
            padding: 12px 10px;
            border-bottom: 1px solid #e0f0ec;
            color: #1e3b33;
        }

        tr:hover td {
            background: #f4fdfa;
        }

        td:first-child {
            font-weight: 500;
            color: #1e6f5c;
        }

        .edit-btn, .delete-btn, .print-btn {
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.7rem;
            cursor: pointer;
            margin: 0 3px;
        }

        .edit-btn {
            background: #e0f2e9;
            color: #1e6f5c;
            border: 1px solid #b8dbc9;
        }

        .delete-btn {
            background: #ffe4e2;
            color: #b33b2c;
            border: 1px solid #fccbc7;
        }

        .print-btn {
            background: #e6f0ff;
            color: #2c5a7a;
            border: 1px solid #c5d9f0;
        }

        @media (max-width: 700px) {
            body { padding: 0.8rem; }
            .form-section, .list-section { padding: 1rem; }
            .form-row { flex-direction: column; gap: 0.8rem; margin-bottom: 2rem; }
            .search-box input { width: 150px; }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="app-container">
        <div class="main-card">
            <div class="card-header">
                <h1><i class="fas fa-file-invoice-dollar"></i> Hospital Management System</h1>
                <span class="badge">Billing & Finance</span>
            </div>

            <div class="form-section">
                <h2><i class="fas fa-plus-circle"></i> Generate New Bill</h2>
                <form id="billingForm">
                    <!-- Row 1: Select Patient + Bill Date -->
                    <div class="form-row">
                        <div class="field">
                            <label>Select Patient</label>
                            <select id="patientSelect" required>
                                <option value="">-- Choose Patient --</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Bill Date</label>
                            <input type="date" id="billDate" required>
                        </div>
                    </div>

                    <!-- Row 2: Itemized Charges (full width) - simple text -->
                    <div class="form-row full">
                        <div class="field full-width">
                            <label>Item / Service (comma separated)</label>
                            <input type="text" id="items" placeholder="e.g. Consultation, X-Ray, Lab Test, Medicine">
                        </div>
                    </div>

                    <!-- Row 3: Amount + Payment Status -->
                    <div class="form-row">
                        <div class="field">
                            <label>Total Amount (PKR)</label>
                            <input type="number" id="amount" step="0.01" placeholder="e.g. 5000" required>
                        </div>
                        <div class="field">
                            <label>Payment Status</label>
                            <select id="paymentStatus">
                                <option>Pending</option>
                                <option>Partially Paid</option>
                                <option>Paid</option>
                                <option>Insurance Claim</option>
                            </select>
                        </div>
                    </div>

                    <!-- Row 4: Paid Amount (if partially) + Due Date -->
                    <div class="form-row">
                        <div class="field">
                            <label>Paid Amount (PKR)</label>
                            <input type="number" id="paidAmount" step="0.01" placeholder="0" value="0">
                        </div>
                        <div class="field">
                            <label>Due Date</label>
                            <input type="date" id="dueDate">
                        </div>
                    </div>

                    <!-- Row 5: Notes (full width) -->
                    <div class="form-row full">
                        <div class="field full-width">
                            <label>Remarks / Notes</label>
                            <textarea id="notes" rows="2" placeholder="Any additional remarks"></textarea>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit"><i class="fas fa-file-invoice"></i> Generate Bill</button>
                </form>
            </div>

            <div class="list-section">
                <div class="list-toolbar">
                    <h2><i class="fas fa-list-ul"></i> All Bills</h2>
                    <div class="search-wrapper">
                        <div class="search-type">
                            <select id="searchType">
                                <option value="patientName">Patient Name</option>
                                <option value="patientId">Patient ID</option>
                                <option value="status">Payment Status</option>
                            </select>
                        </div>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchBill" placeholder="Type to search...">
                        </div>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table id="billTable">
                        <tbody id="billTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let patients = JSON.parse(localStorage.getItem('patients')) || [];
        let bills = JSON.parse(localStorage.getItem('bills')) || [];

        function populatePatientDropdown() {
            const select = document.getElementById('patientSelect');
            select.innerHTML = '<option value="">-- Choose Patient --</option>';
            patients.forEach(patient => {
                const option = document.createElement('option');
                option.value = patient.id;
                option.textContent = `${patient.name} (${patient.id}) - CNIC: ${patient.cnic}`;
                select.appendChild(option);
            });
        }

        function generateBillId() {
            if (bills.length === 0) return "INV-1001";
            let lastId = bills[bills.length - 1].id;
            let num = parseInt(lastId.split('-')[1]);
            return `INV-${num + 1}`;
        }

        function renderBills(filter = "", searchField = "patientName") {
            const tbody = document.getElementById('billTableBody');
            let filtered = bills;
            if (filter.trim()) {
                filtered = bills.filter(b => {
                    if (searchField === "patientName") {
                        return b.patientName.toLowerCase().includes(filter.toLowerCase());
                    } else if (searchField === "patientId") {
                        return b.patientId.toLowerCase().includes(filter.toLowerCase());
                    } else if (searchField === "status") {
                        return b.paymentStatus.toLowerCase().includes(filter.toLowerCase());
                    }
                    return false;
                });
            }
            tbody.innerHTML = "";
            if (filtered.length === 0) {
                const row = tbody.insertRow();
                const cell = row.insertCell(0);
                cell.colSpan = 9;
                cell.textContent = "No bills generated yet.";
                cell.style.textAlign = "center";
                cell.style.padding = "2rem";
                cell.style.color = "#1e6f5c";
                return;
            }
            filtered.forEach((bill, idx) => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = bill.id;
                row.insertCell(1).innerText = bill.patientName;
                row.insertCell(2).innerText = bill.billDate;
                row.insertCell(3).innerText = bill.items || "-";
                row.insertCell(4).innerText = `PKR ${bill.amount}`;
                row.insertCell(5).innerText = bill.paymentStatus;
                row.insertCell(6).innerText = bill.paidAmount ? `PKR ${bill.paidAmount}` : "PKR 0";
                row.insertCell(7).innerText = bill.dueDate || "-";
                const actionCell = row.insertCell(8);
                const printBtn = document.createElement('button');
                printBtn.innerText = "Print";
                printBtn.className = "print-btn";
                printBtn.onclick = () => printBill(idx);
                const editBtn = document.createElement('button');
                editBtn.innerText = "Edit";
                editBtn.className = "edit-btn";
                editBtn.onclick = () => editBill(idx);
                const delBtn = document.createElement('button');
                delBtn.innerText = "Delete";
                delBtn.className = "delete-btn";
                delBtn.onclick = () => deleteBill(idx);
                actionCell.appendChild(printBtn);
                actionCell.appendChild(editBtn);
                actionCell.appendChild(delBtn);
            });
        }

        function addBill(e) {
            e.preventDefault();
            const patientId = document.getElementById('patientSelect').value;
            if (!patientId) { alert("Please select a patient"); return; }
            const patient = patients.find(p => p.id === patientId);
            if (!patient) return;

            const billDate = document.getElementById('billDate').value;
            const items = document.getElementById('items').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const paymentStatus = document.getElementById('paymentStatus').value;
            const paidAmount = parseFloat(document.getElementById('paidAmount').value) || 0;
            const dueDate = document.getElementById('dueDate').value;
            const notes = document.getElementById('notes').value;

            if (!billDate || isNaN(amount) || amount <= 0) {
                alert("Please fill valid bill date and amount");
                return;
            }

            const newBill = {
                id: generateBillId(),
                patientId: patient.id,
                patientName: patient.name,
                billDate: billDate,
                items: items,
                amount: amount,
                paymentStatus: paymentStatus,
                paidAmount: paidAmount,
                dueDate: dueDate,
                notes: notes
            };
            bills.push(newBill);
            localStorage.setItem('bills', JSON.stringify(bills));
            renderBills();
            document.getElementById('billingForm').reset();
            document.getElementById('paymentStatus').value = "Pending";
            document.getElementById('paidAmount').value = "0";
        }

        function deleteBill(index) {
            if (confirm("Delete this bill permanently?")) {
                bills.splice(index, 1);
                localStorage.setItem('bills', JSON.stringify(bills));
                const searchValue = document.getElementById('searchBill').value;
                const searchType = document.getElementById('searchType').value;
                renderBills(searchValue, searchType);
            }
        }

        function editBill(index) {
            const bill = bills[index];
            const selectPatient = document.getElementById('patientSelect');
            for (let i = 0; i < selectPatient.options.length; i++) {
                if (selectPatient.options[i].value === bill.patientId) {
                    selectPatient.selectedIndex = i;
                    break;
                }
            }
            document.getElementById('billDate').value = bill.billDate;
            document.getElementById('items').value = bill.items || "";
            document.getElementById('amount').value = bill.amount;
            document.getElementById('paymentStatus').value = bill.paymentStatus;
            document.getElementById('paidAmount').value = bill.paidAmount;
            document.getElementById('dueDate').value = bill.dueDate || "";
            document.getElementById('notes').value = bill.notes || "";
            // remove old
            bills.splice(index, 1);
            localStorage.setItem('bills', JSON.stringify(bills));
            const searchValue = document.getElementById('searchBill').value;
            const searchType = document.getElementById('searchType').value;
            renderBills(searchValue, searchType);
        }

        function printBill(index) {
            const bill = bills[index];
            const patient = patients.find(p => p.id === bill.patientId);
            let printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head><title>Invoice ${bill.id}</title>
                <style>
                    body { font-family: Arial, sans-serif; padding: 2rem; }
                    .invoice { max-width: 600px; margin: auto; border: 1px solid #ccc; padding: 1.5rem; }
                    h2 { color: #1e6f5c; }
                    hr { margin: 1rem 0; }
                    .footer { margin-top: 2rem; font-size: 0.8rem; text-align: center; }
                </style>
                </head>
                <body>
                <div class="invoice">
                    <h2>Hospital Management System</h2>
                    <p><strong>Invoice #:</strong> ${bill.id}</p>
                    <p><strong>Patient:</strong> ${bill.patientName} (${bill.patientId})</p>
                    <p><strong>Date:</strong> ${bill.billDate}</p>
                    <hr>
                    <p><strong>Items/Services:</strong> ${bill.items || "-"}</p>
                    <p><strong>Total Amount:</strong> PKR ${bill.amount}</p>
                    <p><strong>Paid:</strong> PKR ${bill.paidAmount || 0}</p>
                    <p><strong>Due:</strong> PKR ${(bill.amount - (bill.paidAmount || 0)).toFixed(2)}</p>
                    <p><strong>Status:</strong> ${bill.paymentStatus}</p>
                    ${bill.dueDate ? `<p><strong>Due Date:</strong> ${bill.dueDate}</p>` : ''}
                    ${bill.notes ? `<p><strong>Notes:</strong> ${bill.notes}</p>` : ''}
                    <hr>
                    <div class="footer">Thank you for choosing us.</div>
                </div>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        const searchInput = document.getElementById('searchBill');
        const searchTypeSelect = document.getElementById('searchType');
        function handleSearch() {
            renderBills(searchInput.value, searchTypeSelect.value);
        }
        searchInput.addEventListener('input', handleSearch);
        searchTypeSelect.addEventListener('change', handleSearch);

        window.onload = () => {
            if (patients.length === 0) alert("No patients found. Please register at least one patient first.");
            populatePatientDropdown();
            renderBills();
            document.getElementById('billingForm').addEventListener('submit', addBill);
            // Set default bill date to today
            document.getElementById('billDate').valueAsDate = new Date();
        };
    </script>
</body>
</html>
