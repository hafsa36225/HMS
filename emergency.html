<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency | Patient Registration & Trauma Cases</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: url('https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            padding: 1.5rem;
            position: relative;
        }
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(3px);
            z-index: 0;
        }
        .app-container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }
        .main-card {
            background: rgba(255,255,255,0.96);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .card-header {
            background: linear-gradient(120deg, #a5260c, #c0392b);
            padding: 1.2rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .card-header h1 { color: white; font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }
        .badge { background: rgba(255,255,255,0.2); padding: 0.3rem 1rem; border-radius: 60px; font-size: 0.8rem; }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            padding: 0 2rem;
            border-bottom: 1px solid #f0ccc2;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 0.7rem 1.5rem;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #a5260c;
            border-radius: 40px 40px 0 0;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: #fde4d8;
            color: #c0392b;
            border-bottom: 3px solid #c0392b;
        }
        .tab-pane { display: none; padding: 1.8rem 2rem; }
        .tab-pane.active { display: block; }

        .form-section, .list-section { margin-bottom: 1.5rem; }
        .form-section h2, .list-toolbar h2 {
            font-size: 1.2rem; color: #c0392b; margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
        }
        .form-row {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 5rem;
            flex-wrap: wrap;
        }
        .field { flex: 1; min-width: 180px; }
        .full-width { flex: 1; width: 100%; }
        .field label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #b64926; display: block; margin-bottom: 5px; }
        .field input, .field select, .field textarea { width: 100%; padding: 10px 12px; border: 1px solid #f0ccc2; border-radius: 14px; font-size: 0.9rem; background: white; font-family: inherit; }
        .field input:focus, .field select:focus { outline: none; border-color: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,0.15); }
        .btn-submit {
            background: #c0392b; color: white; border: none; padding: 12px 20px;
            border-radius: 40px; cursor: pointer; width: 100%; display: flex;
            align-items: center; justify-content: center; gap: 8px; margin-top: 0.5rem;
        }
        .btn-submit:hover { background: #a5260c; transform: translateY(-2px); }
        .table-wrapper { overflow-x: auto; border-radius: 18px; border: 1px solid #f0ccc2; margin-top: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 10px; background: #fde4d8; color: #a5260c; }
        td { padding: 10px; border-bottom: 1px solid #f0e0dc; color: #4a2a1e; }
        tr:hover td { background: #fff6f2; }
        .critical { background: #ffe0e0; font-weight: bold; }
        .serious { background: #fff0e0; }
        .edit-btn, .delete-btn { border: none; padding: 3px 10px; border-radius: 30px; margin: 0 2px; cursor: pointer; font-size: 0.7rem; }
        .edit-btn { background: #fde4d8; color: #b64926; }
        .delete-btn { background: #ffe4e2; color: #b33b2c; }
        .list-toolbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1rem; }
        .search-box { display: flex; align-items: center; background: #f1f5f9; border-radius: 60px; padding: 0.2rem 0.2rem 0.2rem 1rem; border: 1px solid #cbdbe2; }
        .search-box input { border: none; background: transparent; padding: 6px 10px; width: 200px; outline: none; }
        @media (max-width: 700px) { .form-row { flex-direction: column; margin-bottom: 2rem; } .tabs { padding: 0 1rem; } }
    </style>
</head>
<body>
<div class="bg-overlay"></div>
<div class="app-container">
    <div class="main-card">
        <div class="card-header">
            <h1><i class="fas fa-ambulance"></i> Emergency & Trauma Center</h1>
            <span class="badge">Emergency Patient Registration | Cases</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="register">🚑 New Emergency Patient</button>
            <button class="tab-btn" data-tab="cases">📋 Emergency Cases</button>
        </div>

        <!-- Tab 1: Emergency Patient Registration -->
        <div id="registerTab" class="tab-pane active">
            <div class="form-section">
                <h2><i class="fas fa-user-plus"></i> Quick Emergency Registration</h2>
                <form id="emergencyRegForm">
                    <!-- Row 1: Full Name + Age -->
                    <div class="form-row">
                        <div class="field"><label>Full Name *</label><input type="text" id="emergencyName" required></div>
                        <div class="field"><label>Age *</label><input type="number" id="emergencyAge" required></div>
                    </div>
                    <!-- Row 2: Gender + Mobile -->
                    <div class="form-row">
                        <div class="field"><label>Gender</label><select id="emergencyGender"><option>Male</option><option>Female</option><option>Other</option></select></div>
                        <div class="field"><label>Mobile Number</label><input type="tel" id="emergencyMobile" placeholder="Optional"></div>
                    </div>
                    <!-- Row 3: CNIC + (empty for alignment) -->
                    <div class="form-row">
                        <div class="field"><label>CNIC (Optional)</label><input type="text" id="emergencyCnic" placeholder="12345-6789012-3"></div>
                        <div class="field"></div>
                    </div>
                    <!-- Row 4: Triage Level + Emergency Type -->
                    <div class="form-row">
                        <div class="field"><label>Triage Level *</label><select id="emergencyTriage"><option value="Critical">🔴 Critical (Immediate)</option><option value="Serious">🟠 Serious (Very urgent)</option><option value="Stable">🟢 Stable (Urgent)</option></select></div>
                        <div class="field"><label>Emergency Type *</label><select id="emergencyType"><option>Accident / Trauma</option><option>Cardiac Arrest</option><option>Stroke</option><option>Bleeding</option><option>Breathing Difficulty</option><option>Poisoning</option><option>Seizure</option><option>Burn</option><option>Other</option></select></div>
                    </div>
                    <!-- Row 5: Arrival Date & Time (auto) + Assigned Doctor -->
                    <div class="form-row">
                        <div class="field"><label>Arrival Date & Time</label><input type="datetime-local" id="arrivalDateTime" required></div>
                        <div class="field"><label>Assigned Doctor (Optional)</label><select id="emergencyDoctor"><option value="">-- Assign --</option><option>Dr. Asma Khalid</option><option>Dr. Bilal Ahmed</option><option>Dr. Farah Zafar</option><option>Dr. Hamid Ali</option></select></div>
                    </div>
                    <!-- Row 6: Initial Notes (full width) -->
                    <div class="form-row full">
                        <div class="field full-width"><label>Initial Observations / Notes</label><textarea id="emergencyNotes" rows="2" placeholder="e.g., BP, pulse, injury description"></textarea></div>
                    </div>
                    <button type="submit" class="btn-submit"><i class="fas fa-save"></i> Register Emergency Patient</button>
                </form>
            </div>
        </div>

        <!-- Tab 2: Emergency Cases List -->
        <div id="casesTab" class="tab-pane">
            <div class="list-toolbar">
                <h2><i class="fas fa-list-ul"></i> All Emergency Cases</h2>
                <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchEmergencyCase" placeholder="Search by name, ID, triage..."></div>
            </div>
            <div class="table-wrapper">
                <table id="emergencyTable">
                    <thead>
                        <tr><th>Case ID</th><th>Patient ID</th><th>Patient Name</th><th>Age</th><th>Triage</th><th>Arrival</th><th>Emergency Type</th><th>Doctor</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="emergencyTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Load data from localStorage
    let patients = JSON.parse(localStorage.getItem('patients')) || [];
    let emergencies = JSON.parse(localStorage.getItem('emergencies')) || [];

    // Helper: Generate patient ID (same as main registration)
    function generatePatientId() {
        if (patients.length === 0) return "HMS-1001";
        let lastId = patients[patients.length-1].id;
        let num = parseInt(lastId.split('-')[1]);
        return `HMS-${num+1}`;
    }

    // Helper: Generate emergency case ID
    function generateEmergencyId() {
        if (emergencies.length === 0) return "EMG-1001";
        let lastId = emergencies[emergencies.length-1].caseId;
        let num = parseInt(lastId.split('-')[1]);
        return `EMG-${num+1}`;
    }

    // Render emergency cases table
    function renderEmergencyCases(filter = "") {
        let tbody = document.getElementById('emergencyTableBody');
        let filtered = emergencies;
        if (filter.trim()) {
            filtered = emergencies.filter(e => 
                e.patientName.toLowerCase().includes(filter.toLowerCase()) ||
                e.caseId.toLowerCase().includes(filter.toLowerCase()) ||
                e.patientId.toLowerCase().includes(filter.toLowerCase()) ||
                e.triage.toLowerCase().includes(filter.toLowerCase())
            );
        }
        tbody.innerHTML = "";
        if (filtered.length === 0) {
            let row = tbody.insertRow();
            let cell = row.insertCell(0);
            cell.colSpan = 10;
            cell.textContent = "No emergency cases registered yet.";
            cell.style.textAlign = "center";
            cell.style.padding = "2rem";
            return;
        }
        filtered.forEach((caseItem, idx) => {
            let row = tbody.insertRow();
            if (caseItem.triage === "Critical") row.classList.add('critical');
            else if (caseItem.triage === "Serious") row.classList.add('serious');
            row.insertCell(0).innerText = caseItem.caseId;
            row.insertCell(1).innerText = caseItem.patientId;
            row.insertCell(2).innerText = caseItem.patientName;
            row.insertCell(3).innerText = caseItem.age;
            row.insertCell(4).innerText = caseItem.triage;
            row.insertCell(5).innerText = caseItem.arrivalDateTime;
            row.insertCell(6).innerText = caseItem.emergencyType;
            row.insertCell(7).innerText = caseItem.assignedDoctor || "-";
            row.insertCell(8).innerText = caseItem.status || "Under Treatment";
            let actionCell = row.insertCell(9);
            let editBtn = document.createElement('button');
            editBtn.innerText = "Edit";
            editBtn.className = "edit-btn";
            editBtn.onclick = () => editEmergencyCase(idx);
            let delBtn = document.createElement('button');
            delBtn.innerText = "Delete";
            delBtn.className = "delete-btn";
            delBtn.onclick = () => deleteEmergencyCase(idx);
            actionCell.appendChild(editBtn);
            actionCell.appendChild(delBtn);
        });
    }

    // Add new emergency patient (registers patient + creates emergency case)
    function addEmergencyPatient(e) {
        e.preventDefault();
        let name = document.getElementById('emergencyName').value.trim();
        let age = parseInt(document.getElementById('emergencyAge').value);
        let gender = document.getElementById('emergencyGender').value;
        let mobile = document.getElementById('emergencyMobile').value.trim();
        let cnic = document.getElementById('emergencyCnic').value.trim();
        let triage = document.getElementById('emergencyTriage').value;
        let emergencyType = document.getElementById('emergencyType').value;
        let arrivalDateTime = document.getElementById('arrivalDateTime').value;
        let assignedDoctor = document.getElementById('emergencyDoctor').value;
        let notes = document.getElementById('emergencyNotes').value;

        if (!name || !age) { alert("Please fill Name and Age"); return; }
        if (!arrivalDateTime) { alert("Please set arrival date & time"); return; }

        // Check if patient already exists by mobile or CNIC (optional, but we can create new anyway)
        let existingPatient = null;
        if (cnic) existingPatient = patients.find(p => p.cnic === cnic);
        if (!existingPatient && mobile) existingPatient = patients.find(p => p.mobile === mobile);
        
        let patientId;
        let patientName;
        if (existingPatient) {
            patientId = existingPatient.id;
            patientName = existingPatient.name;
            alert(`Patient already registered as ${patientName} (${patientId}). Creating emergency case.`);
        } else {
            // Create new patient
            patientId = generatePatientId();
            patientName = name;
            let newPatient = {
                id: patientId,
                name: name,
                age: age,
                gender: gender,
                mobile: mobile,
                cnic: cnic || "",
                address: "Emergency Registration",
                bloodGroup: "Unknown",
                allergy: notes.substring(0,100)
            };
            patients.push(newPatient);
            localStorage.setItem('patients', JSON.stringify(patients));
        }

        // Create emergency case
        let caseId = generateEmergencyId();
        let newEmergency = {
            caseId: caseId,
            patientId: patientId,
            patientName: patientName,
            age: age,
            triage: triage,
            emergencyType: emergencyType,
            arrivalDateTime: arrivalDateTime,
            assignedDoctor: assignedDoctor,
            notes: notes,
            status: "Under Treatment",
            createdAt: new Date().toISOString()
        };
        emergencies.push(newEmergency);
        localStorage.setItem('emergencies', JSON.stringify(emergencies));
        renderEmergencyCases();
        document.getElementById('emergencyRegForm').reset();
        // Set default arrival to now
        let now = new Date().toISOString().slice(0,16);
        document.getElementById('arrivalDateTime').value = now;
        alert(`Emergency case ${caseId} registered for ${patientName}.`);
        // Optionally switch to cases tab
        document.querySelector('.tab-btn[data-tab="cases"]').click();
    }

    function editEmergencyCase(index) {
        let caseItem = emergencies[index];
        // For simplicity, we'll just load into a simple prompt or we can create a modal, but I'll use a simple prompt for editing status and doctor
        let newStatus = prompt("Update case status (Under Treatment, Admitted, Discharged, Transferred):", caseItem.status);
        if (newStatus) caseItem.status = newStatus;
        let newDoctor = prompt("Assign/change doctor:", caseItem.assignedDoctor);
        if (newDoctor !== null) caseItem.assignedDoctor = newDoctor;
        emergencies[index] = caseItem;
        localStorage.setItem('emergencies', JSON.stringify(emergencies));
        renderEmergencyCases();
    }

    function deleteEmergencyCase(index) {
        if (confirm("Delete this emergency case? This will not delete the patient record.")) {
            emergencies.splice(index, 1);
            localStorage.setItem('emergencies', JSON.stringify(emergencies));
            renderEmergencyCases(document.getElementById('searchEmergencyCase').value);
        }
    }

    // Search input listener
    document.getElementById('searchEmergencyCase').addEventListener('input', (e) => {
        renderEmergencyCases(e.target.value);
    });

    // Tab switching
    let tabs = document.querySelectorAll('.tab-btn');
    let panes = document.querySelectorAll('.tab-pane');
    tabs.forEach(btn => {
        btn.addEventListener('click', () => {
            let tabId = btn.getAttribute('data-tab');
            panes.forEach(p => p.classList.remove('active'));
            tabs.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(tabId + 'Tab').classList.add('active');
            if (tabId === 'cases') renderEmergencyCases();
        });
    });

    // Set default arrival datetime to now
    window.onload = () => {
        let now = new Date().toISOString().slice(0,16);
        document.getElementById('arrivalDateTime').value = now;
        renderEmergencyCases();
        document.getElementById('emergencyRegForm').addEventListener('submit', addEmergencyPatient);
    };
</script>
</body>
</html>
